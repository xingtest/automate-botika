name: test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      SELECTED_PLATFORM:
        description: 'Platform to test (webchat|dhai|instagram|facebook|telegram)'
        required: true
        default: 'webchat'
        type: choice
        options:
        - webchat
        - dhai
        - instagram
        - facebook
        - telegram
      FILENAME:
        description: 'Test data filename (e.g. testing.xlsx)'
        required: false
        default: 'testing.xlsx'
      TESTER_NAME:
        description: 'Name of the tester'
        required: false
        default: 'GitHub Actions Bot'
      GREETING:
        description: 'Greeting message'
        required: false
        default: 'Haloo'
      WEBCHAT_URL:
        description: 'WebChat URL'
        required: false
        default: 'https://chat.botika.online/tpUyiey'
      DHAI_TARGET_URL:
        description: 'DHAI Target URL'
        required: false
        default: 'https://client.botika.online/virtual-avatar-luna/?mode=wake-word'
      DHAI_WAKE_WORD:
        description: 'DHAI Wake Word'
        required: false
        default: 'halo luna'
      INSTAGRAM_USERNAME:
        description: 'Instagram Target Username'
        required: false
        default: 'ahmadnurbrasta2.2'
      FACEBOOK_FANPAGE_ID:
        description: 'Facebook Fanpage ID'
        required: false
        default: '114552848299710'
      TELEGRAM_BOT_USERNAME:
        description: 'Telegram Bot Username'
        required: false
        default: 'TestingNewIntegrasiBot'

jobs:
  test-single-platform:
    runs-on: ubuntu-latest

    # =====================================================
    # 🔥 GANTI PLATFORM DI SINI SAJA
    # pilihan: webchat | dhai | instagram | facebook | telegram
    # =====================================================
    env:
      SELECTED_PLATFORM: telegram
      DEFAULT_FILENAME: testing.xlsx
      DEFAULT_TESTER_NAME: Ini apaan dah Bot
      DEFAULT_GREETING: Haloo

      # -----------------------------
      # TARGET URL / ID / USERNAME
      # -----------------------------
      WEBCHAT_URL: "https://chat.botika.online/tpUyiey"
      DHAI_TARGET_URL: "https://client.botika.online/virtual-avatar-luna/?mode=wake-word"
      DHAI_WAKE_WORD: "halo luna"
      INSTAGRAM_USERNAME: "ahmadnurbrasta2.2"
      FACEBOOK_FANPAGE_ID: "114552848299710"
      TELEGRAM_BOT_USERNAME: "TestingNewIntegrasiBot"

      # -----------------------------
      # GEMINI EVALUATION
      # -----------------------------
      API_KEY_GEMINI: "AIzaSyAn7_5FYqOUbHGGVGam48wxv14zXmh1dr0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: |
          echo "📦 Installing Node.js dependencies..."
          npm install

      - name: Install Google Chrome
        run: |
          echo "🔄 Installing Google Chrome..."
          sudo apt-get update
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          echo "CHROME_BIN=/usr/bin/google-chrome" >> $GITHUB_ENV
          google-chrome --version

      # =====================================================
      # 🧹 SETUP ENVIRONMENT (.env)
      # =====================================================
      - name: Setup fresh environment
        run: |
          echo "🧹 Setting up fresh environment..."

          rm -rf report/ temp_audio/ log/ 2>/dev/null || true
          mkdir -p report/html report/json temp_audio

          # buat file .env baru
          touch .env

          echo "PLATFORM=${SELECTED_PLATFORM}" >> .env
          echo "FILENAME=${DEFAULT_FILENAME}" >> .env
          echo "TESTER_NAME=${DEFAULT_TESTER_NAME}" >> .env
          echo "GREETING=\"${DEFAULT_GREETING}\"" >> .env
          echo "API_KEY_GEMINI=${API_KEY_GEMINI}" >> .env

          # =====================================================
          # PLATFORM-SPECIFIC TARGET CONFIG
          # =====================================================
          case "${SELECTED_PLATFORM}" in
            webchat)
              echo "TARGET_URL=${WEBCHAT_URL}" >> .env
              ;;
            dhai)
              echo "DHAI_TARGET_URL=${DHAI_TARGET_URL}" >> .env
              echo "DHAI_WAKE_WORD=${DHAI_WAKE_WORD}" >> .env
              ;;
            instagram)
              echo "TARGET_USERNAME=${INSTAGRAM_USERNAME}" >> .env
              ;;
            facebook)
              echo "TARGET_FANPAGE_ID=${FACEBOOK_FANPAGE_ID}" >> .env
              ;;
            telegram)
              echo "TARGET_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}" >> .env
              ;;
            *)
              echo "❌ Unknown platform: ${SELECTED_PLATFORM}"
              exit 1
              ;;
          esac

          echo "✅ Environment ready"
          echo "🔍 Final .env:"
          cat .env

      # =====================================================
      # 📋 ENSURE TEST DATA
      # =====================================================
      - name: Create test data if needed
        run: |
          echo "📋 Ensuring test data exists..."
          if [ ! -f "assets/xlsx/${DEFAULT_FILENAME}" ] && [ ! -f "assets/json/testing.json" ]; then
            mkdir -p assets/json
            node -e "
              const data = [
                { no: 1, title: 'Apa itu asuransi jiwa', pertanyaan: 'Apa itu asuransi jiwa', context: 'Perlindungan finansial terhadap risiko kehidupan.' },
                { no: 2, title: 'Apa itu asuransi kesehatan', pertanyaan: 'Apa itu asuransi kesehatan', context: 'Perlindungan finansial ketika sakit.' }
              ];
              require('fs').writeFileSync('assets/json/testing.json', JSON.stringify(data, null, 2));
            "
            sed -i 's/FILENAME=.*/FILENAME=testing.json/' .env
            echo "⚠️ Excel not found, fallback to JSON"
          fi

      # =====================================================
      # 🧪 RUN TEST
      # =====================================================
      - name: Run complete test
        run: |
          echo "🧪 Running test for ${SELECTED_PLATFORM}..."

          npm run build

          if [ ! -d "dist" ]; then
            echo "❌ Build failed"
            exit 1
          fi

          node dist/main.js ${SELECTED_PLATFORM}

          sleep 3
          node dist/report-cli.js

      # =====================================================
      # 🔍 VERIFY REPORT
      # =====================================================
      - name: Verify dashboard.html
        run: |
          echo "🔍 Verifying dashboard.html..."
          if ! find report/html -name "dashboard.html" | grep -q .; then
            echo "❌ dashboard.html not found"
            exit 1
          fi
          echo "✅ dashboard.html found"

      # =====================================================
      # 📦 UPLOAD ARTIFACT
      # =====================================================
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-${{ github.run_number }}
          path: report/html/
          retention-days: 3