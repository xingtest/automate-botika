name: DHAI Erva Old 152-390

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      SELECTED_PLATFORM:
        description: 'Platform to test'
        required: false
        default: ''
      FILENAME:
        description: 'Test file name'
        required: false
        default: ''
      TESTER_NAME:
        description: 'Tester name'
        required: false
        default: ''
      GREETING:
        description: 'Greeting message'
        required: false
        default: ''
      WEBCHAT_URL:
        description: 'WebChat URL'
        required: false
        default: ''
      INSTAGRAM_USERNAME:
        description: 'Instagram username'
        required: false
        default: ''
      FACEBOOK_FANPAGE_ID:
        description: 'Facebook Fanpage ID'
        required: false
        default: ''
      TELEGRAM_BOT_USERNAME:
        description: 'Telegram Bot Username'
        required: false
        default: ''
      DHAI_TARGET_URL:
        description: 'DHAI Target URL'
        required: false
        default: ''
      DHAI_WAKE_WORD:
        description: 'DHAI Wake Word'
        required: false
        default: ''

jobs:
  test-single-platform:
    runs-on: ubuntu-latest

    # =====================================================
    # 🔥 GANTI PLATFORM DI SINI SAJA (untuk push/PR)
    # pilihan: webchat | dhai | instagram | facebook | telegram
    # =====================================================
    env:
      SELECTED_PLATFORM: dhai
      DEFAULT_FILENAME: DHAI Erva Old 152-390.xlsx
      DEFAULT_TESTER_NAME: Cik test Erva Old 152-390
      DEFAULT_GREETING: Haloo

      # -----------------------------
      # TARGET URL / ID / USERNAME
      # -----------------------------
      WEBCHAT_URL: "https://chat.botika.online/tpUyiey"
      DHAI_TARGET_URL: "https://client.botika.online/virtual-avatar-pln-icon/?mode=wake-word"
      DHAI_WAKE_WORD: "halo luna"
      INSTAGRAM_USERNAME: "ahmadnurbrasta2.2"
      FACEBOOK_FANPAGE_ID: "114552848299710"
      TELEGRAM_BOT_USERNAME: "TestingNewIntegrasiBot"

      # -----------------------------
      # GEMINI EVALUATION
      # -----------------------------
      API_KEY_GEMINI: "AIzaSyAn7_5FYqOUbHGGVGam48wxv14zXmh1dr0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: |
          echo "📦 Installing Node.js dependencies..."
          npm install

      - name: Install Google Chrome
        run: |
          echo "🔄 Installing Google Chrome..."
          sudo apt-get update
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          echo "CHROME_BIN=/usr/bin/google-chrome" >> $GITHUB_ENV
          google-chrome --version

      # =====================================================
      # 🧹 SETUP ENVIRONMENT (.env)
      # Dashboard inputs override env defaults if provided
      # =====================================================
      - name: Setup fresh environment
        run: |
          echo "🧹 Setting up fresh environment..."

          rm -rf report/ temp_audio/ log/ 2>/dev/null || true
          mkdir -p report/html report/json temp_audio

          # Use inputs if provided (non-empty), otherwise use env defaults
          INPUT_PLATFORM="${{ github.event.inputs.SELECTED_PLATFORM }}"
          INPUT_FILENAME="${{ github.event.inputs.FILENAME }}"
          INPUT_TESTER="${{ github.event.inputs.TESTER_NAME }}"
          INPUT_GREETING="${{ github.event.inputs.GREETING }}"

          # Set PLATFORM (use input if not empty, otherwise env default)
          if [ -n "$INPUT_PLATFORM" ] && [ "$INPUT_PLATFORM" != "" ]; then
            PLATFORM="$INPUT_PLATFORM"
          else
            PLATFORM="${SELECTED_PLATFORM}"
          fi

          # Set FILENAME
          if [ -n "$INPUT_FILENAME" ] && [ "$INPUT_FILENAME" != "" ]; then
            FILENAME="$INPUT_FILENAME"
          else
            FILENAME="${DEFAULT_FILENAME}"
          fi

          # Set TESTER
          if [ -n "$INPUT_TESTER" ] && [ "$INPUT_TESTER" != "" ]; then
            TESTER="$INPUT_TESTER"
          else
            TESTER="${DEFAULT_TESTER_NAME}"
          fi

          # Set GREETING
          if [ -n "$INPUT_GREETING" ] && [ "$INPUT_GREETING" != "" ]; then
            GREET="$INPUT_GREETING"
          else
            GREET="${DEFAULT_GREETING}"
          fi

          echo "📋 Using: PLATFORM=$PLATFORM, FILENAME=$FILENAME"

          # buat file .env baru
          touch .env

          echo "PLATFORM=${PLATFORM}" >> .env
          echo "FILENAME=${FILENAME}" >> .env
          echo "TESTER_NAME=${TESTER}" >> .env
          echo "GREETING=\"${GREET}\"" >> .env
          echo "API_KEY_GEMINI=${API_KEY_GEMINI}" >> .env

          # =====================================================
          # PLATFORM-SPECIFIC TARGET CONFIG (inputs override env)
          # =====================================================
          case "${PLATFORM}" in
            webchat)
              URL="${{ github.event.inputs.WEBCHAT_URL }}"
              [ -z "$URL" ] && URL="${WEBCHAT_URL}"
              echo "TARGET_URL=${URL}" >> .env
              ;;
            dhai)
              URL="${{ github.event.inputs.DHAI_TARGET_URL }}"
              [ -z "$URL" ] && URL="${DHAI_TARGET_URL}"
              WAKE="${{ github.event.inputs.DHAI_WAKE_WORD }}"
              [ -z "$WAKE" ] && WAKE="${DHAI_WAKE_WORD}"
              echo "DHAI_TARGET_URL=${URL}" >> .env
              echo "DHAI_WAKE_WORD=${WAKE}" >> .env
              ;;
            instagram)
              USER="${{ github.event.inputs.INSTAGRAM_USERNAME }}"
              [ -z "$USER" ] && USER="${INSTAGRAM_USERNAME}"
              echo "TARGET_USERNAME=${USER}" >> .env
              ;;
            facebook)
              FANPAGE="${{ github.event.inputs.FACEBOOK_FANPAGE_ID }}"
              [ -z "$FANPAGE" ] && FANPAGE="${FACEBOOK_FANPAGE_ID}"
              echo "TARGET_FANPAGE_ID=${FANPAGE}" >> .env
              ;;
            telegram)
              BOT="${{ github.event.inputs.TELEGRAM_BOT_USERNAME }}"
              [ -z "$BOT" ] && BOT="${TELEGRAM_BOT_USERNAME}"
              echo "TARGET_BOT_USERNAME=${BOT}" >> .env
              ;;
            *)
              echo "❌ Unknown platform: ${PLATFORM}"
              exit 1
              ;;
          esac

          # Export SELECTED_PLATFORM for later steps
          echo "SELECTED_PLATFORM=${PLATFORM}" >> $GITHUB_ENV

          echo "✅ Environment ready"
          echo "🔍 Final .env:"
          cat .env

      # =====================================================
      # 📋 ENSURE TEST DATA
      # =====================================================
      - name: Create test data if needed
        run: |
          echo "📋 Ensuring test data exists..."
          if [ ! -f "assets/xlsx/${DEFAULT_FILENAME}" ] && [ ! -f "assets/json/testing.json" ]; then
            mkdir -p assets/json
            node -e "
              const data = [
                { no: 1, title: 'Apa itu asuransi jiwa', pertanyaan: 'Apa itu asuransi jiwa', context: 'Perlindungan finansial terhadap risiko kehidupan.' },
                { no: 2, title: 'Apa itu asuransi kesehatan', pertanyaan: 'Apa itu asuransi kesehatan', context: 'Perlindungan finansial ketika sakit.' }
              ];
              require('fs').writeFileSync('assets/json/testing.json', JSON.stringify(data, null, 2));
            "
            sed -i 's/FILENAME=.*/FILENAME=testing.json/' .env
            echo "⚠️ Excel not found, fallback to JSON"
          fi

      # =====================================================
      # 🧪 RUN TEST
      # =====================================================
      - name: Run complete test
        run: |
          echo "🧪 Running test for ${SELECTED_PLATFORM}..."

          npm run build

          if [ ! -d "dist" ]; then
            echo "❌ Build failed"
            exit 1
          fi

          node dist/main.js ${SELECTED_PLATFORM}

          sleep 3
          node dist/report-cli.js

      # =====================================================
      # 🔍 VERIFY REPORT
      # =====================================================
      - name: Verify dashboard.html
        run: |
          echo "🔍 Verifying dashboard.html..."
          if ! find report/html -name "dashboard.html" | grep -q .; then
            echo "❌ dashboard.html not found"
            exit 1
          fi
          echo "✅ dashboard.html found"

      # =====================================================
      # 📦 UPLOAD ARTIFACT
      # =====================================================
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-${{ github.run_number }}
          path: report/html/
          retention-days: 3