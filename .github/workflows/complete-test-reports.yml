name: Complete Multi-Platform Testing with Full Reports

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform yang akan ditest'
        required: false
        default: 'webchat'
        type: choice
        options:
          - 'webchat'
          - 'telegram'
          - 'facebook'
          - 'instagram'
          - 'dhai'
          - 'dhai-wakeup'
          - 'all'
      filename:
        description: 'Nama file hasil test'
        required: false
        default: 'test-result'
        type: string
      tester_name:
        description: 'Nama tester'
        required: false
        default: 'GitHub Actions Bot'
        type: string
      greeting:
        description: 'Greeting message'
        required: false
        default: 'Halo, saya ingin bertanya'
        type: string
      webchat_url:
        description: 'URL Webchat'
        required: false
        default: 'https://chat.botika.online/tpUyiey'
        type: string

jobs:
  test-all-platforms:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platform == 'all' }}
    strategy:
      matrix:
        platform: [webchat, telegram, facebook, instagram, dhai, dhai-wakeup]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Google Chrome
      run: |
        echo "🔄 Installing Google Chrome..."
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        echo "✅ Google Chrome installed"
        google-chrome --version

    - name: Setup Playwright to use system Chrome
      run: |
        echo "⚡ Configuring Playwright to use system Chrome..."
        echo "PLAYWRIGHT_BROWSERS_PATH=0" >> $GITHUB_ENV

    - name: Setup test environment
      run: |
        cp .env.example .env
        echo "PLATFORM=${{ matrix.platform }}" >> .env
        echo "FILENAME=${{ github.event.inputs.filename || 'test-result' }}.json" >> .env
        echo "TESTER_NAME=${{ github.event.inputs.tester_name || 'GitHub Actions Bot' }}" >> .env
        echo "GREETING=${{ github.event.inputs.greeting || 'Halo, saya ingin bertanya' }}" >> .env
        echo "TARGET_URL=${{ github.event.inputs.webchat_url || 'https://chat.botika.online/tpUyiey' }}" >> .env

    - name: Create test data file if not exists
      run: |
        mkdir -p assets/json
        if [ ! -f "assets/json/${{ github.event.inputs.filename || 'test-result' }}.json" ]; then
          echo '[{"question": "Halo", "expected_keywords": ["halo", "hai", "selamat"]}]' > "assets/json/${{ github.event.inputs.filename || 'test-result' }}.json"
        fi

    - name: Run complete test with reports for ${{ matrix.platform }}
      run: |
        echo "🧪 Running complete test for ${{ matrix.platform }}..."
        
        # Build the application
        npm run build
        
        # Run the test (generates JSON data)
        echo "📝 Running test and generating JSON data..."
        node dist/main.js ${{ matrix.platform }}
        
        # Generate HTML and Excel reports
        echo "📊 Generating HTML and Excel reports..."
        node dist/report-cli.js
        
        echo "✅ Complete test and report generation finished"
      env:
        CI: true
        HEADLESS: true
        PLAYWRIGHT_BROWSERS_PATH: 0
      continue-on-error: true

    - name: Verify all reports generated
      run: |
        echo "=== 📋 Complete Report Verification ==="
        echo ""
        echo "📁 Report directory structure:"
        ls -la report/ 2>/dev/null || echo "❌ No report directory found"
        echo ""
        echo "📄 JSON data files:"
        find report/json/ -name "*.json" -type f -exec ls -lh {} \; 2>/dev/null || echo "❌ No JSON reports found"
        echo ""
        echo "🌐 HTML report files:"
        find report/html/ -name "*.html" -type f -exec ls -lh {} \; 2>/dev/null || echo "❌ No HTML reports found"
        echo ""
        echo "📊 Excel report files:"
        find . -name "*.xlsx" -type f -exec ls -lh {} \; 2>/dev/null || echo "❌ No Excel files found"
        echo ""
        echo "📸 Screenshot files:"
        screenshot_count=$(find report/html/ -name "*.png" -type f 2>/dev/null | wc -l)
        echo "Found $screenshot_count screenshot files"
        if [ $screenshot_count -gt 0 ]; then
          find report/html/ -name "*.png" -type f | head -5
        fi
        echo ""
        echo "🎵 Audio files:"
        find temp_audio/ -type f -exec ls -lh {} \; 2>/dev/null || echo "ℹ️ No audio files (normal for most platforms)"
        echo ""
        echo "📦 Total files to upload:"
        find report/ temp_audio/ -type f 2>/dev/null | wc -l

    - name: Upload complete test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: complete-reports-${{ matrix.platform }}-${{ github.run_number }}
        path: |
          report/
          temp_audio/
          *.xlsx
        retention-days: 30

  test-single-platform:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platform != 'all' }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Google Chrome
      run: |
        echo "🔄 Installing Google Chrome..."
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        echo "✅ Google Chrome installed"
        google-chrome --version

    - name: Setup Playwright to use system Chrome
      run: |
        echo "⚡ Configuring Playwright to use system Chrome..."
        echo "PLAYWRIGHT_BROWSERS_PATH=0" >> $GITHUB_ENV

    - name: Setup test environment
      run: |
        cp .env.example .env
        echo "PLATFORM=${{ github.event.inputs.platform || 'webchat' }}" >> .env
        echo "FILENAME=${{ github.event.inputs.filename || 'test-result' }}.json" >> .env
        echo "TESTER_NAME=${{ github.event.inputs.tester_name || 'GitHub Actions Bot' }}" >> .env
        echo "GREETING=${{ github.event.inputs.greeting || 'Halo, saya ingin bertanya' }}" >> .env
        echo "TARGET_URL=${{ github.event.inputs.webchat_url || 'https://chat.botika.online/tpUyiey' }}" >> .env

    - name: Create test data file if not exists
      run: |
        mkdir -p assets/json
        if [ ! -f "assets/json/${{ github.event.inputs.filename || 'test-result' }}.json" ]; then
          echo '[{"question": "Halo", "expected_keywords": ["halo", "hai", "selamat"]}]' > "assets/json/${{ github.event.inputs.filename || 'test-result' }}.json"
        fi

    - name: Run complete test with reports for ${{ github.event.inputs.platform || 'webchat' }}
      run: |
        echo "🧪 Running complete test for ${{ github.event.inputs.platform || 'webchat' }}..."
        
        # Build the application
        npm run build
        
        # Run the test (generates JSON data)
        echo "📝 Running test and generating JSON data..."
        node dist/main.js ${{ github.event.inputs.platform || 'webchat' }}
        
        # Generate HTML and Excel reports
        echo "📊 Generating HTML and Excel reports..."
        node dist/report-cli.js
        
        echo "✅ Complete test and report generation finished"
      env:
        CI: true
        HEADLESS: true
        PLAYWRIGHT_BROWSERS_PATH: 0
      continue-on-error: true

    - name: Verify all reports generated
      run: |
        echo "=== 📋 Complete Report Verification ==="
        echo ""
        echo "📁 Report directory structure:"
        ls -la report/ 2>/dev/null || echo "❌ No report directory found"
        echo ""
        echo "📄 JSON data files:"
        find report/json/ -name "*.json" -type f -exec ls -lh {} \; 2>/dev/null || echo "❌ No JSON reports found"
        echo ""
        echo "🌐 HTML report files:"
        find report/html/ -name "*.html" -type f -exec ls -lh {} \; 2>/dev/null || echo "❌ No HTML reports found"
        echo ""
        echo "📊 Excel report files:"
        find . -name "*.xlsx" -type f -exec ls -lh {} \; 2>/dev/null || echo "❌ No Excel files found"
        echo ""
        echo "📸 Screenshot files:"
        screenshot_count=$(find report/html/ -name "*.png" -type f 2>/dev/null | wc -l)
        echo "Found $screenshot_count screenshot files"
        if [ $screenshot_count -gt 0 ]; then
          find report/html/ -name "*.png" -type f | head -5
        fi
        echo ""
        echo "🎵 Audio files:"
        find temp_audio/ -type f -exec ls -lh {} \; 2>/dev/null || echo "ℹ️ No audio files (normal for most platforms)"
        echo ""
        echo "📦 Total files to upload:"
        find report/ temp_audio/ -type f 2>/dev/null | wc -l

    - name: Upload complete test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: complete-reports-${{ github.event.inputs.platform || 'webchat' }}-${{ github.run_number }}
        path: |
          report/
          temp_audio/
          *.xlsx
        retention-days: 30

  consolidate-all-reports:
    runs-on: ubuntu-latest
    needs: [test-all-platforms, test-single-platform]
    if: always()
    steps:
    - name: Download all test artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Organize complete reports
      run: |
        mkdir -p final-reports/html
        mkdir -p final-reports/json
        mkdir -p final-reports/excel
        mkdir -p final-reports/audio
        mkdir -p final-reports/screenshots
        
        echo "=== 📦 Organizing Complete Reports ==="
        for artifact_dir in artifacts/complete-reports-*/; do
          if [ -d "$artifact_dir" ]; then
            platform_name=$(basename "$artifact_dir" | sed 's/complete-reports-//' | sed 's/-[0-9]*$//')
            echo "📋 Processing reports for: $platform_name"
            
            # Copy HTML reports with platform prefix
            if [ -d "$artifact_dir/report/html" ]; then
              for html_dir in "$artifact_dir/report/html"/*; do
                if [ -d "$html_dir" ]; then
                  dir_name=$(basename "$html_dir")
                  cp -r "$html_dir" "final-reports/html/${platform_name}-${dir_name}" 2>/dev/null || true
                fi
              done
            fi
            
            # Copy JSON reports
            if [ -d "$artifact_dir/report/json" ]; then
              cp -r "$artifact_dir/report/json"/* final-reports/json/ 2>/dev/null || true
            fi
            
            # Copy Excel files
            find "$artifact_dir" -name "*.xlsx" -exec cp {} final-reports/excel/ \; 2>/dev/null || true
            
            # Copy audio files if exist
            if [ -d "$artifact_dir/temp_audio" ]; then
              cp -r "$artifact_dir/temp_audio"/* final-reports/audio/ 2>/dev/null || true
            fi
            
            # Extract screenshots to separate folder for easy access
            find "$artifact_dir/report/html" -name "*.png" -exec cp {} final-reports/screenshots/ \; 2>/dev/null || true
          fi
        done
        
        echo "=== 📊 Final Report Summary ==="
        echo "HTML reports: $(find final-reports/html/ -name "*.html" -type f 2>/dev/null | wc -l)"
        echo "JSON reports: $(find final-reports/json/ -name "*.json" -type f 2>/dev/null | wc -l)"
        echo "Excel reports: $(find final-reports/excel/ -name "*.xlsx" -type f 2>/dev/null | wc -l)"
        echo "Screenshots: $(find final-reports/screenshots/ -name "*.png" -type f 2>/dev/null | wc -l)"
        echo "Audio files: $(find final-reports/audio/ -type f 2>/dev/null | wc -l)"

    - name: Create comprehensive report index
      run: |
        cat > final-reports/README.md << EOF
        # 🧪 Complete Test Reports - Build ${{ github.run_number }}
        
        **Generated:** $(date)  
        **Platform:** ${{ github.event.inputs.platform || 'Multiple platforms' }}  
        **Tester:** ${{ github.event.inputs.tester_name || 'GitHub Actions Bot' }}  
        **Browser:** Google Chrome (system installed)  
        
        ## 📁 Report Structure
        - \`html/\` - Complete HTML reports with embedded screenshots
        - \`json/\` - Raw test data in JSON format
        - \`excel/\` - Excel reports for analysis
        - \`screenshots/\` - All screenshots extracted for easy viewing
        - \`audio/\` - Audio files (if any, mainly for DHAI platform)
        
        ## 🌐 HTML Reports
        EOF
        
        find final-reports/html/ -name "*.html" -type f | sort | while read -r file; do
          filename=$(basename "$file")
          dirname=$(basename "$(dirname "$file")")
          echo "- [$dirname/$filename](html/$dirname/$filename)" >> final-reports/README.md
        done
        
        echo "" >> final-reports/README.md
        echo "## 📊 Excel Reports" >> final-reports/README.md
        find final-reports/excel/ -name "*.xlsx" -type f | while read -r file; do
          filename=$(basename "$file")
          echo "- [$filename](excel/$filename)" >> final-reports/README.md
        done
        
        echo "" >> final-reports/README.md
        echo "## 📸 Screenshots" >> final-reports/README.md
        screenshot_count=$(find final-reports/screenshots/ -name "*.png" -type f 2>/dev/null | wc -l)
        echo "Total screenshots: $screenshot_count files in \`screenshots/\` folder" >> final-reports/README.md

    - name: Upload consolidated complete reports
      uses: actions/upload-artifact@v4
      with:
        name: all-test-reports-${{ github.run_number }}
        path: final-reports/
        retention-days: 60

  summary:
    runs-on: ubuntu-latest
    needs: [consolidate-all-reports]
    if: always()
    steps:
    - name: Download consolidated reports
      uses: actions/download-artifact@v4
      with:
        name: all-test-reports-${{ github.run_number }}
        path: reports/

    - name: Generate comprehensive test summary
      run: |
        echo "# 🧪 Complete Multi-Platform Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        echo "**Platform:** ${{ github.event.inputs.platform || 'Multiple platforms' }}" >> $GITHUB_STEP_SUMMARY
        echo "**Tester:** ${{ github.event.inputs.tester_name || 'GitHub Actions Bot' }}" >> $GITHUB_STEP_SUMMARY
        echo "**Test File:** ${{ github.event.inputs.filename || 'test-result' }}.json" >> $GITHUB_STEP_SUMMARY
        echo "**Browser:** Google Chrome (system installed)" >> $GITHUB_STEP_SUMMARY
        echo "**Generated:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -d "reports" ]; then
          html_count=$(find reports/html/ -name "*.html" -type f 2>/dev/null | wc -l)
          json_count=$(find reports/json/ -name "*.json" -type f 2>/dev/null | wc -l)
          excel_count=$(find reports/excel/ -name "*.xlsx" -type f 2>/dev/null | wc -l)
          screenshot_count=$(find reports/screenshots/ -name "*.png" -type f 2>/dev/null | wc -l)
          audio_count=$(find reports/audio/ -type f 2>/dev/null | wc -l)
          
          echo "## 📊 Complete Report Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- **HTML Reports:** $html_count files" >> $GITHUB_STEP_SUMMARY
          echo "- **Excel Reports:** $excel_count files" >> $GITHUB_STEP_SUMMARY
          echo "- **JSON Data:** $json_count files" >> $GITHUB_STEP_SUMMARY
          echo "- **Screenshots:** $screenshot_count files" >> $GITHUB_STEP_SUMMARY
          echo "- **Audio Files:** $audio_count files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📁 Available HTML Reports" >> $GITHUB_STEP_SUMMARY
          find reports/html/ -name "*.html" -type f 2>/dev/null | head -10 | while read -r file; do
            filename=$(basename "$file")
            dirname=$(basename "$(dirname "$file")")
            echo "- 📄 $dirname/$filename" >> $GITHUB_STEP_SUMMARY
          done
          
          remaining=$(find reports/html/ -name "*.html" -type f 2>/dev/null | wc -l)
          if [ $remaining -gt 10 ]; then
            more_count=$((remaining - 10))
            echo "- ... and $more_count more HTML reports" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📥 Download Complete Reports" >> $GITHUB_STEP_SUMMARY
          echo "Download the **all-test-reports-${{ github.run_number }}** artifact to access:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Complete HTML reports with screenshots" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Excel files for data analysis" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Raw JSON test data" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All screenshots in separate folder" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Audio files (if generated)" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚡ Performance Optimizations" >> $GITHUB_STEP_SUMMARY
          echo "- Using system Google Chrome (faster installation)" >> $GITHUB_STEP_SUMMARY
          echo "- Complete report generation included" >> $GITHUB_STEP_SUMMARY
          echo "- Screenshots and Excel files properly captured" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **No reports generated**" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## ⚙️ Test Configuration" >> $GITHUB_STEP_SUMMARY
        echo "- **Webchat URL:** ${{ github.event.inputs.webchat_url || 'Default URL' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Greeting:** ${{ github.event.inputs.greeting || 'Halo, saya ingin bertanya' }}" >> $GITHUB_STEP_SUMMARY