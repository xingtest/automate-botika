name: Automated Testing with Virtual Microphone

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}
    
    - name: Setup virtual display (for headless audio)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb pulseaudio
        # Start virtual audio system (not required but good for compatibility)
        pulseaudio --start --verbose
    
    - name: Create test environment
      run: |
        cp .env.example .env
        echo "BROWSER_NAME=${{ matrix.browser }}" >> .env
    
    - name: Run Virtual Microphone Tests
      run: |
        # Set display for virtual audio
        export DISPLAY=:99
        Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        
        # Run tests with virtual microphone
        npm run test:dhai-wakeup
      env:
        CI: true
        HEADLESS: true
        VIRTUAL_MICROPHONE: true
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.browser }}
        path: |
          report/
          temp_audio/
        retention-days: 7
    
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: screenshots-${{ matrix.browser }}
        path: report/screenshoot/
        retention-days: 7

  test-platforms:
    runs-on: ubuntu-latest
    needs: test
    
    strategy:
      matrix:
        platform: [webchat, telegram, facebook, instagram, dhai, dhai-wakeup]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
    
    - name: Setup virtual environment
      run: |
        cp .env.example .env
        echo "PLATFORM=${{ matrix.platform }}" >> .env
    
    - name: Run platform tests
      run: npm run test:${{ matrix.platform }}
      env:
        CI: true
        HEADLESS: true
    
    - name: Upload platform results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: platform-results-${{ matrix.platform }}
        path: report/
        retention-days: 7