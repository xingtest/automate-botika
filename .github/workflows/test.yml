name: Test Otomatis Multi Platform

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform yang akan ditest'
        required: false
        default: 'webchat'
        type: choice
        options:
          - 'webchat'
          # - 'telegram'
          # - 'facebook'
          # - 'instagram'
          # - 'dhai'
          # - 'dhai-wakeup'
          # - 'all'
      filename:
        description: 'Nama file hasil test'
        required: false
        default: 'test-result'
        type: string
      tester_name:
        description: 'Nama tester'
        required: false
        default: 'GitHub Actions Bot'
        type: string
      greeting:
        description: 'Greeting message'
        required: false
        default: 'Halo, saya ingin bertanya'
        type: string
      webchat_url:
        description: 'URL Webchat'
        required: false
        default: 'https://chat.botika.online/tpUyiey'
        type: string
      telegram_url:
        description: 'URL Telegram'
        required: false
        default: 'https://web.telegram.org'
        type: string
      facebook_url:
        description: 'URL Facebook'
        required: false
        default: 'https://www.facebook.com'
        type: string
      instagram_url:
        description: 'URL Instagram'
        required: false
        default: 'https://www.instagram.com'
        type: string
      dhai_url:
        description: 'URL DHAI'
        required: false
        default: 'https://dhai.example.com'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Project
    
    steps:
    - name: Checkout kode
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build TypeScript
      run: npm run build
    
    - name: Upload build hasil
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ github.run_number }}
        path: |
          dist/
          package.json
        retention-days: 30

  test-platforms:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.platform == 'all' }}
    
    strategy:
      matrix:
        platform: [webchat, telegram, facebook, instagram, dhai, dhai-wakeup]
    
    steps:
    - name: Checkout kode
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright
      run: npx playwright install --with-deps chromium
    
    - name: Setup environment
      run: |
        cp .env.example .env
        echo "PLATFORM=${{ matrix.platform }}" >> .env
        echo "FILENAME=${{ github.event.inputs.filename || 'test-result' }}" >> .env
        echo "TESTER_NAME=${{ github.event.inputs.tester_name || 'GitHub Actions' }}" >> .env
        echo "GREETING=${{ github.event.inputs.greeting || 'Halo' }}" >> .env
        echo "WEBCHAT_URL=${{ github.event.inputs.webchat_url || 'https://example.com/webchat' }}" >> .env
        echo "TELEGRAM_URL=${{ github.event.inputs.telegram_url || 'https://web.telegram.org' }}" >> .env
        echo "FACEBOOK_URL=${{ github.event.inputs.facebook_url || 'https://www.facebook.com' }}" >> .env
        echo "INSTAGRAM_URL=${{ github.event.inputs.instagram_url || 'https://www.instagram.com' }}" >> .env
        echo "DHAI_URL=${{ github.event.inputs.dhai_url || 'https://dhai.example.com' }}" >> .env
    
    - name: Jalankan test platform
      run: npm run test:${{ matrix.platform }}
      env:
        CI: true
        HEADLESS: true
    
    - name: Generate report summary
      if: always()
      run: |
        echo "Generating test summary for ${{ matrix.platform }}..."
        if [ -d "report" ]; then
          echo "✅ Report folder exists"
          find report/ -type f -name "*.json" -o -name "*.html" -o -name "*.xlsx" | head -10
        else
          echo "❌ Report folder not found"
        fi
        
        # Create platform info file
        echo "Platform: ${{ matrix.platform }}" > report/platform-info.txt
        echo "Build: ${{ github.run_number }}" >> report/platform-info.txt
        echo "Timestamp: $(date)" >> report/platform-info.txt
    
    - name: Upload hasil test lengkap
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-report-${{ matrix.platform }}-${{ github.run_number }}
        path: |
          report/
          temp_audio/
          dist/
          .env
        retention-days: 30

  test-single:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.platform != 'all' }}
    
    steps:
    - name: Checkout kode
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright
      run: npx playwright install --with-deps chromium
    
    - name: Setup environment
      run: |
        cp .env.example .env
        echo "PLATFORM=${{ github.event.inputs.platform }}" >> .env
        echo "FILENAME=${{ github.event.inputs.filename || 'test-result' }}" >> .env
        echo "TESTER_NAME=${{ github.event.inputs.tester_name || 'GitHub Actions' }}" >> .env
        echo "GREETING=${{ github.event.inputs.greeting || 'Halo' }}" >> .env
        echo "WEBCHAT_URL=${{ github.event.inputs.webchat_url || 'https://example.com/webchat' }}" >> .env
        echo "TELEGRAM_URL=${{ github.event.inputs.telegram_url || 'https://web.telegram.org' }}" >> .env
        echo "FACEBOOK_URL=${{ github.event.inputs.facebook_url || 'https://www.facebook.com' }}" >> .env
        echo "INSTAGRAM_URL=${{ github.event.inputs.instagram_url || 'https://www.instagram.com' }}" >> .env
        echo "DHAI_URL=${{ github.event.inputs.dhai_url || 'https://dhai.example.com' }}" >> .env
    
    - name: Jalankan test
      run: npm run test:${{ github.event.inputs.platform }}
      env:
        CI: true
        HEADLESS: true
    
    - name: Generate report summary
      if: always()
      run: |
        echo "Generating test summary for ${{ github.event.inputs.platform }}..."
        if [ -d "report" ]; then
          echo "✅ Report folder exists"
          find report/ -type f -name "*.json" -o -name "*.html" -o -name "*.xlsx" | head -10
        else
          echo "❌ Report folder not found"
        fi
        
        # Create platform info file
        echo "Platform: ${{ github.event.inputs.platform }}" > report/platform-info.txt
        echo "Build: ${{ github.run_number }}" >> report/platform-info.txt
        echo "Timestamp: $(date)" >> report/platform-info.txt
    
    - name: Upload hasil test lengkap
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-report-${{ github.event.inputs.platform }}-${{ github.run_number }}
        path: |
          report/
          temp_audio/
          dist/
          .env
        retention-days: 30

  collect-reports:
    runs-on: ubuntu-latest
    needs: [test-platforms, test-single]
    if: always()
    name: Kumpulkan Semua Report
    
    steps:
    - name: Download semua artifact
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
    
    - name: Organisir report
      run: |
        mkdir -p final-reports
        
        # Copy semua report ke folder final
        for dir in artifacts/test-report-*/; do
          if [ -d "$dir" ]; then
            platform_name=$(basename "$dir" | sed 's/test-report-//' | sed 's/-[0-9]*$//')
            echo "Processing reports for: $platform_name"
            
            mkdir -p "final-reports/$platform_name"
            
            # Copy report files
            if [ -d "$dir/report" ]; then
              cp -r "$dir/report"/* "final-reports/$platform_name/" 2>/dev/null || true
            fi
            
            # Copy audio files if exist
            if [ -d "$dir/temp_audio" ]; then
              mkdir -p "final-reports/$platform_name/audio"
              cp -r "$dir/temp_audio"/* "final-reports/$platform_name/audio/" 2>/dev/null || true
            fi
            
            # Copy env file
            if [ -f "$dir/.env" ]; then
              cp "$dir/.env" "final-reports/$platform_name/config.env" 2>/dev/null || true
            fi
          fi
        done
        
        # Create index file
        echo "# Test Reports - Build ${{ github.run_number }}" > final-reports/README.md
        echo "" >> final-reports/README.md
        echo "Generated: $(date)" >> final-reports/README.md
        echo "" >> final-reports/README.md
        echo "## Platforms Tested:" >> final-reports/README.md
        
        for platform_dir in final-reports/*/; do
          if [ -d "$platform_dir" ] && [ "$(basename "$platform_dir")" != "README.md" ]; then
            platform=$(basename "$platform_dir")
            echo "- **$platform**" >> final-reports/README.md
            
            # Count files in each platform
            file_count=$(find "$platform_dir" -type f | wc -l)
            echo "  - Files: $file_count" >> final-reports/README.md
          fi
        done
        
        echo "" >> final-reports/README.md
        echo "## File Structure:" >> final-reports/README.md
        tree final-reports/ >> final-reports/README.md 2>/dev/null || ls -la final-reports/ >> final-reports/README.md
    
    - name: Upload final reports
      uses: actions/upload-artifact@v4
      with:
        name: complete-test-reports-${{ github.run_number }}
        path: final-reports/
        retention-days: 60

  summary:
    runs-on: ubuntu-latest
    needs: [collect-reports]
    if: always()
    
    steps:
    - name: Download final reports
      uses: actions/download-artifact@v4
      with:
        name: complete-test-reports-${{ github.run_number }}
        path: reports/
    
    - name: Buat ringkasan
      run: |
        echo "# 📊 Hasil Test" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        echo "**Platform:** ${{ github.event.inputs.platform || 'Semua platform' }}" >> $GITHUB_STEP_SUMMARY
        echo "**Tester:** ${{ github.event.inputs.tester_name || 'GitHub Actions' }}" >> $GITHUB_STEP_SUMMARY
        echo "**Filename:** ${{ github.event.inputs.filename || 'test-result' }}" >> $GITHUB_STEP_SUMMARY
        echo "**Greeting:** ${{ github.event.inputs.greeting || 'Halo' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Hitung jumlah platform yang ditest
        if [ -d "reports" ]; then
          platform_count=$(find reports/ -maxdepth 1 -type d | grep -v "^reports/$" | wc -l)
          total_files=$(find reports/ -type f | wc -l)
          echo "**Platform yang ditest:** $platform_count" >> $GITHUB_STEP_SUMMARY
          echo "**Total file report:** $total_files" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📁 Report Files Generated" >> $GITHUB_STEP_SUMMARY
          
          for platform_dir in reports/*/; do
            if [ -d "$platform_dir" ]; then
              platform=$(basename "$platform_dir")
              file_count=$(find "$platform_dir" -type f | wc -l)
              echo "- **$platform**: $file_count files" >> $GITHUB_STEP_SUMMARY
              
              # List key files
              if [ -f "$platform_dir"/*.xlsx ]; then
                echo "  - Excel reports: ✅" >> $GITHUB_STEP_SUMMARY
              fi
              if [ -f "$platform_dir"/*.html ]; then
                echo "  - HTML reports: ✅" >> $GITHUB_STEP_SUMMARY
              fi
              if [ -f "$platform_dir"/*.json ]; then
                echo "  - JSON data: ✅" >> $GITHUB_STEP_SUMMARY
              fi
              if [ -d "$platform_dir/audio" ]; then
                audio_count=$(find "$platform_dir/audio" -type f | wc -l)
                echo "  - Audio files: $audio_count" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done
        else
          echo "**Status:** No reports found" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Tampilkan URL yang digunakan
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🌐 URL Target" >> $GITHUB_STEP_SUMMARY
        echo "- **Webchat:** ${{ github.event.inputs.webchat_url || 'https://example.com/webchat' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Telegram:** ${{ github.event.inputs.telegram_url || 'https://web.telegram.org' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Facebook:** ${{ github.event.inputs.facebook_url || 'https://www.facebook.com' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Instagram:** ${{ github.event.inputs.instagram_url || 'https://www.instagram.com' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **DHAI:** ${{ github.event.inputs.dhai_url || 'https://dhai.example.com' }}" >> $GITHUB_STEP_SUMMARY